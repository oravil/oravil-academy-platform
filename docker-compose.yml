services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oravil_academy}
      POSTGRES_USER: ${POSTGRES_USER:-oravil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oravil}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
