services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oravil_academy}
      POSTGRES_USER: ${POSTGRES_USER:-oravil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oravil_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oravil} -d ${POSTGRES_DB:-oravil_academy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - dev_network

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - tools
    env_file:
      - .env.docker
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@oravil.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_secret}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - dev_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dev_network:
    driver: bridge
